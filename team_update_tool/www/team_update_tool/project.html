{% extends "templates/web.html" %}

{% block title %}Project - Team Update Tool{% endblock %}

{% block page_content %}
<div id="projectContent" class="tut-page-body">
	<div class="container">
		<div class="tut-loading" id="projectLoading">
			<div class="tut-spinner"></div>
			<p>Loading project details...</p>
		</div>
		<div id="projectError" class="tut-error-page" style="display:none;">
			<div class="text-center py-5">
				<h2 id="errorMsg">Project not found</h2>
				<a href="/team_update_tool/projects" class="tut-btn tut-btn-primary mt-3">Back to Projects</a>
			</div>
		</div>
		<div id="projectDetail" style="display:none;"></div>
	</div>
</div>
{% endblock %}

{% block script %}
<script>
frappe.ready(function() {
	var pathParts = window.location.pathname.split('/');
	var projectName = pathParts[pathParts.length - 1];
	if (projectName && projectName !== 'project') {
		loadProject(projectName);
	} else {
		document.getElementById('projectLoading').style.display = 'none';
		document.getElementById('projectError').style.display = 'block';
		document.getElementById('errorMsg').textContent = 'No project specified.';
	}
});

function loadProject(name) {
	fetch('/api/method/team_update_tool.api.projects.get_project_detail?name=' + encodeURIComponent(name))
		.then(function(r) { return r.json(); })
		.then(function(data) {
			if (data.message) {
				renderProject(data.message);
			} else {
				document.getElementById('projectLoading').style.display = 'none';
				document.getElementById('projectError').style.display = 'block';
				document.getElementById('errorMsg').textContent = 'Project not found.';
			}
		})
		.catch(function(e) {
			document.getElementById('projectLoading').style.display = 'none';
			document.getElementById('projectError').style.display = 'block';
			document.getElementById('errorMsg').textContent = 'Error loading project.';
		});
}

function renderProject(p) {
	var color = p.status && p.status.color ? p.status.color : '#6b7280';
	var sname = p.status && p.status.status_name ? p.status.status_name : '';

	var html = '';
	// Header
	html += '<div class="tut-page-header" style="margin-top:-2rem;">';
	html += '<div class="container">';
	html += '<div class="tut-breadcrumbs"><a href="/team_update_tool">Home</a><span class="separator">/</span><a href="/team_update_tool/projects">Projects</a><span class="separator">/</span><span>' + escHtml(p.project_title) + '</span></div>';
	html += '<div class="tut-page-header-content"><div class="tut-page-header-top"><h1 class="tut-page-title">' + escHtml(p.project_title) + '</h1>';
	html += '<span class="tut-status-badge tut-status-lg" style="--badge-color:' + color + '">' + sname + '</span></div>';
	html += '<div class="tut-page-meta"><span><strong>Team:</strong> ' + escHtml(p.team_name || p.team) + '</span>';
	if (p.priority) html += '<span class="tut-priority tut-priority-' + p.priority.toLowerCase() + '">' + p.priority + '</span>';
	if (p.project_category) html += '<span><strong>Category:</strong> ' + escHtml(p.project_category) + '</span>';
	html += '</div></div></div></div>';

	html += '<div class="container tut-page-body"><div class="tut-detail-grid"><div class="tut-detail-main">';

	// Description
	if (p.description) {
		html += '<section class="tut-detail-section"><h2 class="tut-section-title-sm">Description</h2><div class="tut-desc-content">' + escHtml(p.description) + '</div></section>';
	}

	// Technologies
	if (p.technologies && p.technologies.length) {
		html += '<section class="tut-detail-section"><h2 class="tut-section-title-sm">Technologies</h2><div class="tut-tags">';
		p.technologies.forEach(function(t) { html += '<span class="tut-tag">' + escHtml(t) + '</span>'; });
		html += '</div></section>';
	}

	// Screenshots
	if (p.screenshots && p.screenshots.length) {
		html += '<section class="tut-detail-section"><h2 class="tut-section-title-sm">Screenshots (' + p.screenshots.length + ')</h2><div class="tut-gallery-grid">';
		p.screenshots.forEach(function(s) {
			html += '<a href="' + s.screenshot + '" target="_blank" class="tut-gallery-item"><img src="' + s.screenshot + '" alt="' + escHtml(s.caption || 'Screenshot') + '" loading="lazy">';
			if (s.caption) html += '<div class="tut-gallery-caption">' + escHtml(s.caption) + '</div>';
			html += '</a>';
		});
		html += '</div></section>';
	}

	// Files
	if (p.files && p.files.length) {
		html += '<section class="tut-detail-section"><h2 class="tut-section-title-sm">Files (' + p.files.length + ')</h2><div class="tut-files-list">';
		p.files.forEach(function(f) {
			html += '<a href="' + f.file + '" target="_blank" class="tut-file-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><div><div class="tut-file-name">' + escHtml(f.file_name || f.file) + '</div>';
			if (f.description) html += '<div class="tut-file-desc">' + escHtml(f.description) + '</div>';
			html += '</div></a>';
		});
		html += '</div></section>';
	}

	// Updates
	if (p.updates && p.updates.length) {
		html += '<section class="tut-detail-section"><h2 class="tut-section-title-sm">Updates (' + p.updates.length + ')</h2><div class="tut-updates-list">';
		p.updates.forEach(function(u) {
			html += '<div class="tut-update-item"><div class="tut-update-header"><h4>' + escHtml(u.update_title) + '</h4><span class="tut-update-date">' + u.update_date + '</span></div>';
			if (u.update_description) html += '<div class="tut-update-desc">' + escHtml(u.update_description) + '</div>';
			if (u.updated_by) html += '<div class="tut-update-author">— ' + escHtml(u.updated_by) + '</div>';
			html += '</div>';
		});
		html += '</div></section>';
	}

	html += '</div>';

	// Sidebar
	html += '<div class="tut-detail-sidebar"><div class="tut-sidebar-card"><h3 class="tut-sidebar-title">Project Info</h3><div class="tut-info-list">';
	html += '<div class="tut-info-item"><span class="tut-info-label">Created</span><span class="tut-info-value">' + formatDate(p.creation) + '</span></div>';
	if (p.start_date) html += '<div class="tut-info-item"><span class="tut-info-label">Start</span><span class="tut-info-value">' + p.start_date + '</span></div>';
	if (p.due_date) html += '<div class="tut-info-item"><span class="tut-info-label">Due</span><span class="tut-info-value">' + p.due_date + '</span></div>';
	if (p.completion_date) html += '<div class="tut-info-item"><span class="tut-info-label">Completed</span><span class="tut-info-value">' + p.completion_date + '</span></div>';
	if (p.approved_by) html += '<div class="tut-info-item"><span class="tut-info-label">Approved By</span><span class="tut-info-value">' + escHtml(p.approved_by) + '</span></div>';
	html += '</div></div>';

	// GitHub
	if (p.github_info) {
		var g = p.github_info;
		html += '<div class="tut-sidebar-card"><h3 class="tut-sidebar-title">GitHub Repository</h3><div class="tut-github-info">';
		html += '<a href="' + g.repository_url + '" target="_blank" class="tut-github-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg><span>' + escHtml(g.repository_name || 'View Repository') + '</span></a>';
		if (g.default_branch) html += '<div class="tut-github-detail"><span>Branch: ' + g.default_branch + '</span>' + (g.commit_hash ? '<span title="' + g.commit_hash + '">' + g.commit_hash.substring(0,7) + '...</span>' : '') + '</div>';
		if (g.languages) html += '<div class="tut-github-langs">' + escHtml(g.languages) + '</div>';
		html += '</div></div>';
	}

	// Tags
	if (p.tags) {
		html += '<div class="tut-sidebar-card"><h3 class="tut-sidebar-title">Tags</h3><div class="tut-tags">';
		p.tags.split(',').forEach(function(t) {
			t = t.trim();
			if (t) html += '<span class="tut-tag">' + escHtml(t) + '</span>';
		});
		html += '</div></div>';
	}

	html += '</div></div></div>';

	var loading = document.getElementById('projectLoading');
	loading.parentNode.removeChild(loading);
	document.getElementById('projectDetail').innerHTML = html;
	document.getElementById('projectDetail').style.display = 'block';
}

function formatDate(d) {
	if (!d) return '';
	return d.substring(0,10);
}
</script>
{% endblock %}
