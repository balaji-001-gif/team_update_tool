{% extends "templates/web.html" %}

{% block title %}Project - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
{% endblock %}

{% block page_content %}
<div class="tut-main-area">
	<div class="container py-4">
		<div class="tut-loading" id="projectLoading">
			<div class="spinner-border text-success" role="status"></div>
			<p class="text-muted mt-2">Loading project details...</p>
		</div>

		<div id="projectError" style="display:none;">
			<div class="text-center py-5">
				<div class="empty-icon mx-auto mb-2">
					<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
				</div>
				<h4 id="errorMsg">Project not found</h4>
				<a href="/team_update_tool/projects" class="btn btn-success rounded-pill px-4 mt-2">Back to Projects</a>
			</div>
		</div>

		<div id="projectDetail" style="display:none;"></div>
	</div>
</div>
{% endblock %}

{% block script %}
<script src="/assets/team_update_tool/js/team_update_tool.js"></script>
<script>
function escHtml(s) {
	if (!s) return '';
	return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

frappe.ready(function() {
	var pathParts = window.location.pathname.split('/');
	var projectName = pathParts[pathParts.length - 1];
	if (projectName && projectName !== 'project' && projectName !== '') {
		loadProject(projectName);
	} else {
		document.getElementById('projectLoading').style.display = 'none';
		document.getElementById('projectError').style.display = 'block';
		document.getElementById('errorMsg').textContent = 'No project specified.';
	}
});

function loadProject(name) {
	fetch('/api/method/team_update_tool.api.projects.get_project_detail?name=' + encodeURIComponent(name))
		.then(function(r) { return r.json(); })
		.then(function(data) {
			if (data.message) {
				renderProject(data.message);
			} else if (data.exc) {
				// Show actual server error
				document.getElementById('projectLoading').style.display = 'none';
				document.getElementById('projectError').style.display = 'block';
				var errMsg = 'Error loading project.';
				try {
					var exc = JSON.parse(data.exc);
					if (exc && exc[0] && exc[0].indexOf) {
						errMsg = exc[0].indexOf('Error loading project') !== -1 ? exc[0].split(':').slice(1).join(':').trim() : exc[0];
					}
				} catch(e) {}
				document.getElementById('errorMsg').textContent = errMsg;
			} else {
				document.getElementById('projectLoading').style.display = 'none';
				document.getElementById('projectError').style.display = 'block';
				document.getElementById('errorMsg').textContent = 'Project not found.';
			}
		})
		.catch(function(err) {
			document.getElementById('projectLoading').style.display = 'none';
			document.getElementById('projectError').style.display = 'block';
			document.getElementById('errorMsg').textContent = 'Network error: ' + err.message;
		});
}

function renderProject(p) {
	var color = p.status && p.status.color ? p.status.color : '#6b7280';
	var sname = p.status && p.status.status_name ? p.status.status_name : '';
	var html = '';

	// Breadcrumb + Header
	html += '<nav aria-label="breadcrumb" class="mb-3"><ol class="breadcrumb small">' +
		'<li class="breadcrumb-item"><a href="/team_update_tool" class="text-decoration-none">Home</a></li>' +
		'<li class="breadcrumb-item"><a href="/team_update_tool/projects" class="text-decoration-none">Projects</a></li>' +
		'<li class="breadcrumb-item active" aria-current="page">' + escHtml(p.project_title) + '</li></ol></nav>';

	html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
		'<div class="d-flex flex-wrap align-items-start justify-content-between gap-2 mb-2">' +
		'<h3 class="fw-bold m-0">' + escHtml(p.project_title) + '</h3>' +
		'<span class="tut-status-badge" style="background:' + color + '15;color:' + color + ';border:1px solid ' + color + '30;font-size:0.82rem;padding:0.3rem 0.85rem;">' + sname + '</span></div>' +
		'<div class="d-flex flex-wrap gap-3 mt-2">' +
		'<span class="text-muted small"><strong>Team:</strong> ' + escHtml(p.team_name || p.team) + '</span>' +
		(p.priority ? '<span class="small fw-semibold tut-priority-' + p.priority.toLowerCase() + '">' + p.priority + ' Priority</span>' : '') +
		(p.project_category ? '<span class="text-muted small"><strong>Category:</strong> ' + escHtml(p.project_category) + '</span>' : '') +
		'</div></div></div>';

	// Main grid
	html += '<div class="row g-4"><div class="col-lg-8">';

	// Description
	if (p.description) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-2">Description</h5>' +
			'<p style="color:#334155;white-space:pre-wrap;">' + escHtml(p.description) + '</p></div></div>';
	}

	// README Section
	if (p.readme) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-3"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" class="me-2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>README</h5>';
		
		if (p.readme.readme_content) {
			html += '<div class="tut-readme-content">' + escHtml(p.readme.readme_content) + '</div>';
		}
		
		if (p.readme.readme_file) {
			html += '<div class="mt-3 pt-3 border-top">' +
				'<a href="' + p.readme.readme_file + '" target="_blank" class="btn btn-success btn-sm rounded-pill">' +
				'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-1"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download README File</a></div>';
		}
		
		html += '</div></div>';
	}

	// Technologies
	if (p.technologies && p.technologies.length) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-2">Technologies</h5><div>';
		p.technologies.forEach(function(t) { html += '<span class="tut-tag">' + escHtml(t) + '</span> '; });
		html += '</div></div></div>';
	}

	// Screenshots
	if (p.screenshots && p.screenshots.length) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-3">Screenshots (' + p.screenshots.length + ')</h5>' +
			'<div class="row g-2">';
		p.screenshots.forEach(function(s) {
			html += '<div class="col-md-6"><a href="' + s.screenshot + '" target="_blank" class="d-block rounded-3 overflow-hidden border" style="background:#f8f9fa;">' +
				'<img src="' + s.screenshot + '" alt="' + escHtml(s.caption || 'Screenshot') + '" class="w-100" loading="lazy" style="display:block;">' +
				(s.caption ? '<div class="p-2 small text-muted bg-white border-top">' + escHtml(s.caption) + '</div>' : '') +
				'</a></div>';
		});
		html += '</div></div></div>';
	}

	// Files
	if (p.files && p.files.length) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-3">Files (' + p.files.length + ')</h5>';
		p.files.forEach(function(f) {
			html += '<a href="' + f.file + '" target="_blank" class="tut-file-item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><div><div class="tut-file-name">' + escHtml(f.file_name || f.file) + '</div>' + (f.description ? '<div class="tut-file-desc">' + escHtml(f.description) + '</div>' : '') + '</div></a>';
		});
		html += '</div></div>';
	}

	// Updates
	if (p.updates && p.updates.length) {
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h5 class="fw-bold mb-3">Updates (' + p.updates.length + ')</h5>';
		p.updates.forEach(function(u) {
			html += '<div class="tut-update-item"><div class="d-flex justify-content-between align-items-start"><h5 class="m-0">' + escHtml(u.update_title) + '</h5><span class="tut-update-date">' + (u.update_date || '') + '</span></div>' +
				(u.update_description ? '<div class="tut-update-desc">' + escHtml(u.update_description) + '</div>' : '') +
				(u.updated_by ? '<div class="tut-update-author">— ' + escHtml(u.updated_by) + '</div>' : '') +
				'</div>';
		});
		html += '</div></div>';
	}

	html += '</div>'; // col-lg-8

	// Sidebar
	html += '<div class="col-lg-4">' +
		'<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
		'<h6 class="fw-bold mb-3">Project Info</h6>' +
		'<div class="d-flex flex-column gap-2 small">' +
		'<div class="d-flex justify-content-between"><span class="text-muted">Created</span><span class="fw-medium">' + formatDate(p.creation) + '</span></div>' +
		(p.start_date ? '<div class="d-flex justify-content-between"><span class="text-muted">Start</span><span class="fw-medium">' + p.start_date + '</span></div>' : '') +
		(p.due_date ? '<div class="d-flex justify-content-between"><span class="text-muted">Due</span><span class="fw-medium">' + p.due_date + '</span></div>' : '') +
		(p.completion_date ? '<div class="d-flex justify-content-between"><span class="text-muted">Completed</span><span class="fw-medium">' + p.completion_date + '</span></div>' : '') +
		(p.approved_by ? '<div class="d-flex justify-content-between"><span class="text-muted">Approved By</span><span class="fw-medium">' + escHtml(p.approved_by) + '</span></div>' : '') +
		'</div></div></div>';

	// GitHub
	if (p.github_info) {
		var g = p.github_info;
		html += '<div class="card border-0 shadow-sm rounded-4 mb-4"><div class="card-body p-4">' +
			'<h6 class="fw-bold mb-3"><svg width="18" height="18" viewBox="0 0 24 24" fill="#24292e" class="me-1"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>GitHub Repository</h6>' +
			'<a href="' + g.repository_url + '" target="_blank" class="btn btn-dark btn-sm w-100 rounded-pill mb-2 d-flex align-items-center justify-content-center gap-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg> Open Repository</a>' +
			(g.default_branch ? '<div class="d-flex justify-content-between small text-muted mt-2"><span>Branch: ' + g.default_branch + '</span>' + (g.commit_hash ? '<span title="' + g.commit_hash + '">' + g.commit_hash.substring(0,7) + '...</span>' : '') + '</div>' : '') +
			(g.languages ? '<div class="mt-1 small text-muted">' + escHtml(g.languages) + '</div>' : '') +
			'</div></div>';
	}

	// Tags
	if (p.tags) {
		html += '<div class="card border-0 shadow-sm rounded-4"><div class="card-body p-4">' +
			'<h6 class="fw-bold mb-2">Tags</h6><div class="d-flex flex-wrap gap-1">';
		p.tags.split(',').forEach(function(t) {
			t = t.trim();
			if (t) html += '<span class="tut-tag">' + escHtml(t) + '</span>';
		});
		html += '</div></div></div>';
	}

	html += '</div></div>'; // end row

	var loading = document.getElementById('projectLoading');
	if (loading) loading.remove();
	document.getElementById('projectDetail').innerHTML = html;
	document.getElementById('projectDetail').style.display = 'block';
}
</script>
{% endblock %}
