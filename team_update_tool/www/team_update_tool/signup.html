{% extends "templates/web.html" %}

{% block title %}Sign Up - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
body { background: var(--tut-dark-gradient); }
</style>
{% endblock %}

{% block page_content %}
<div class="tut-auth-container">
	<!-- Floating Shapes -->
	<div class="tut-hero-shape tut-hero-shape-1" style="top: -200px; left: -150px;"></div>
	<div class="tut-hero-shape tut-hero-shape-2" style="bottom: -150px; right: -150px;"></div>
	
	<div class="tut-auth-card">
		<div class="card-header">
			<div class="mb-3">
				<div class="d-inline-flex align-items-center justify-content-center rounded-circle" style="width: 60px; height: 60px; background: var(--tut-primary-gradient); box-shadow: var(--tut-shadow-glow);">
					<i class="fas fa-user-plus text-white fs-4"></i>
				</div>
			</div>
			<h3>Create Account</h3>
			<p class="mb-0">Join us and get started today</p>
		</div>

		<form id="signupForm">
			<div class="mb-3">
				<label class="form-label fw-bold" for="signup_email">
					<i class="fas fa-envelope me-1" style="color: var(--tut-primary);"></i> Email <span class="text-danger">*</span>
				</label>
				<input type="email" id="signup_email" name="email" class="form-control" required placeholder="you@example.com" style="padding: 0.875rem 1rem;">
			</div>
			<div class="row g-3 mb-3">
				<div class="col-sm-6">
					<label class="form-label fw-bold" for="signup_first">
						<i class="fas fa-user me-1" style="color: var(--tut-primary);"></i> First Name <span class="text-danger">*</span>
					</label>
					<input type="text" id="signup_first" name="first_name" class="form-control" required placeholder="John" style="padding: 0.875rem 1rem;">
				</div>
				<div class="col-sm-6">
					<label class="form-label fw-bold" for="signup_last">
						<i class="fas fa-user me-1" style="color: var(--tut-primary);"></i> Last Name
					</label>
					<input type="text" id="signup_last" name="last_name" class="form-control" placeholder="Doe" style="padding: 0.875rem 1rem;">
				</div>
			</div>
			<div class="mb-4">
				<label class="form-label fw-bold" for="signup_password">
					<i class="fas fa-lock me-1" style="color: var(--tut-primary);"></i> Password <span class="text-danger">*</span>
				</label>
				<input type="password" id="signup_password" name="password" class="form-control" required minlength="6" placeholder="••••••••" style="padding: 0.875rem 1rem;">
			</div>
			<button type="submit" class="btn btn-lg w-100 shadow" id="signupBtn">
				<i class="fas fa-rocket me-2"></i>
				Create Account
			</button>
		</form>

		<div id="signupMessage" class="mt-3" style="display:none;"></div>

		<div class="text-center mt-4 pt-3" style="border-top: 1px solid var(--tut-border);">
			<p class="text-muted mb-2">Already have an account?</p>
			<a href="/team_update_tool/login" class="btn btn-outline-primary w-100">
				<i class="fas fa-sign-in-alt me-2"></i>
				Sign In
			</a>
		</div>
	</div>
</div>
{% endblock %}

{% block script %}
<script>
frappe.ready(function() {
	var form = document.getElementById('signupForm');
	if (!form) return;
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		var btn = form.querySelector('button[type="submit"]');
		var msg = document.getElementById('signupMessage');
		var email = document.getElementById('signup_email').value;
		var first = document.getElementById('signup_first').value;
		var last = document.getElementById('signup_last').value;
		var pwd = document.getElementById('signup_password').value;

		btn.disabled = true;
		btn.innerHTML = 'Creating account...';
		msg.style.display = 'none';

		fetch('/api/method/frappe.core.doctype.user.user.sign_up', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': frappe.csrf_token },
			body: JSON.stringify({
				email: email,
				first_name: first,
				last_name: last,
				password: pwd,
				redirect_to: '/team_update_tool/dashboard'
			})
		})
		.then(function(r) { return r.json(); })
		.then(function(data) {
			if (data.message) {
				msg.className = 'alert alert-success border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 fw-semibold">Account created! <a href="/team_update_tool/login" class="fw-bold">Sign In →</a></p>';
				msg.style.display = 'block';
				form.reset();
			} else if (data.exc) {
				var err = JSON.parse(data.exc);
				msg.className = 'alert alert-danger border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 small">' + (err[0] || 'An error occurred') + '</p>';
				msg.style.display = 'block';
			} else {
				msg.className = 'alert alert-success border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 fw-semibold">Check your email for the verification link.</p>';
				msg.style.display = 'block';
			}
			btn.disabled = false;
			btn.innerHTML = 'Create Account';
		})
		.catch(function() {
			msg.className = 'alert alert-danger border-0 rounded-3';
			msg.innerHTML = '<p class="mb-0 small">Network error. Please try again.</p>';
			msg.style.display = 'block';
			btn.disabled = false;
			btn.innerHTML = 'Create Account';
		});
	});
});
</script>
{% endblock %}
