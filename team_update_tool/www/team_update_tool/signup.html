{% extends "templates/web.html" %}

{% block title %}Sign Up - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
{% endblock %}

{% block page_content %}
<div class="tut-auth-page">
	<div class="tut-auth-card">
		<div class="text-center mb-3">
			<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
			<h2 class="mt-2">Create Account</h2>
			<p class="text-muted">Sign up to get started</p>
		</div>

		<form id="signupForm">
			<div class="mb-3">
				<label class="form-label fw-semibold small" for="signup_email">Email <span class="text-danger">*</span></label>
				<input type="email" id="signup_email" name="email" class="form-control" required placeholder="you@example.com">
			</div>
			<div class="row g-2 mb-3">
				<div class="col-sm-6">
					<label class="form-label fw-semibold small" for="signup_first">First Name <span class="text-danger">*</span></label>
					<input type="text" id="signup_first" name="first_name" class="form-control" required placeholder="John">
				</div>
				<div class="col-sm-6">
					<label class="form-label fw-semibold small" for="signup_last">Last Name</label>
					<input type="text" id="signup_last" name="last_name" class="form-control" placeholder="Doe">
				</div>
			</div>
			<div class="mb-3">
				<label class="form-label fw-semibold small" for="signup_password">Password <span class="text-danger">*</span></label>
				<input type="password" id="signup_password" name="password" class="form-control" required minlength="6" placeholder="••••••••">
			</div>
			<button type="submit" class="btn btn-success w-100 rounded-pill fw-semibold py-2">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
				Create Account
			</button>
		</form>

		<div id="signupMessage" class="mt-3" style="display:none;"></div>

		<p class="text-center text-muted small mt-3 mb-0">
			Already have an account? <a href="/team_update_tool/login" class="fw-semibold text-success text-decoration-none">Sign In</a>
		</p>
	</div>
</div>
{% endblock %}

{% block script %}
<script>
frappe.ready(function() {
	var form = document.getElementById('signupForm');
	if (!form) return;
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		var btn = form.querySelector('button[type="submit"]');
		var msg = document.getElementById('signupMessage');
		var email = document.getElementById('signup_email').value;
		var first = document.getElementById('signup_first').value;
		var last = document.getElementById('signup_last').value;
		var pwd = document.getElementById('signup_password').value;

		btn.disabled = true;
		btn.innerHTML = 'Creating account...';
		msg.style.display = 'none';

		fetch('/api/method/frappe.core.doctype.user.user.sign_up', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': frappe.csrf_token },
			body: JSON.stringify({
				email: email,
				first_name: first,
				last_name: last,
				password: pwd,
				redirect_to: '/team_update_tool/dashboard'
			})
		})
		.then(function(r) { return r.json(); })
		.then(function(data) {
			if (data.message) {
				msg.className = 'alert alert-success border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 fw-semibold">Account created! <a href="/team_update_tool/login" class="fw-bold">Sign In →</a></p>';
				msg.style.display = 'block';
				form.reset();
			} else if (data.exc) {
				var err = JSON.parse(data.exc);
				msg.className = 'alert alert-danger border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 small">' + (err[0] || 'An error occurred') + '</p>';
				msg.style.display = 'block';
			} else {
				msg.className = 'alert alert-success border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 fw-semibold">Check your email for the verification link.</p>';
				msg.style.display = 'block';
			}
			btn.disabled = false;
			btn.innerHTML = 'Create Account';
		})
		.catch(function() {
			msg.className = 'alert alert-danger border-0 rounded-3';
			msg.innerHTML = '<p class="mb-0 small">Network error. Please try again.</p>';
			msg.style.display = 'block';
			btn.disabled = false;
			btn.innerHTML = 'Create Account';
		});
	});
});
</script>
{% endblock %}
