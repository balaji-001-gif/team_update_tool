{% extends "templates/web.html" %}

{% block title %}Sign In - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
{% endblock %}

{% block page_content %}
<div class="tut-auth-page">
	<div class="tut-auth-card">
		<div class="text-center mb-3">
			<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
			<h2 class="mt-2">Welcome Back</h2>
			<p class="text-muted">Sign in to your account</p>
		</div>

		<form id="loginForm" action="/api/method/login" method="POST">
			<input type="hidden" name="redirect-to" value="/team_update_tool/dashboard">
			<div class="mb-3">
				<label class="form-label fw-semibold small" for="login_email">Email</label>
				<input type="email" id="login_email" name="usr" class="form-control" required placeholder="you@example.com">
			</div>
			<div class="mb-3">
				<label class="form-label fw-semibold small" for="login_password">Password</label>
				<input type="password" id="login_password" name="pwd" class="form-control" required placeholder="••••••••">
			</div>
			<button type="submit" class="btn btn-success w-100 rounded-pill fw-semibold py-2">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
				Sign In
			</button>
		</form>

		<div id="loginMessage" class="mt-3" style="display:none;"></div>

		<p class="text-center text-muted small mt-3 mb-0">
			Don't have an account? <a href="/team_update_tool/signup" class="fw-semibold text-success text-decoration-none">Sign Up</a>
		</p>
	</div>
</div>
{% endblock %}

{% block script %}
<script>
frappe.ready(function() {
	var form = document.getElementById('loginForm');
	if (!form) return;
	form.addEventListener('submit', function(e) {
		e.preventDefault();
		var btn = form.querySelector('button[type="submit"]');
		var msg = document.getElementById('loginMessage');
		var email = document.getElementById('login_email').value;
		var pwd = document.getElementById('login_password').value;

		btn.disabled = true;
		btn.innerHTML = 'Signing in...';
		msg.style.display = 'none';

		fetch('/api/method/login', {
			method: 'POST',
			headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': frappe.csrf_token },
			body: JSON.stringify({ usr: email, pwd: pwd })
		})
		.then(function(r) { return r.json(); })
		.then(function(data) {
			if (data.message && data.message.name) {
				window.location.href = '/team_update_tool/dashboard';
			} else if (data.exc) {
				var err = JSON.parse(data.exc);
				msg.className = 'alert alert-danger border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 small">' + (err[0] || 'Invalid credentials') + '</p>';
				msg.style.display = 'block';
				btn.disabled = false;
				btn.innerHTML = 'Sign In';
			} else {
				msg.className = 'alert alert-danger border-0 rounded-3';
				msg.innerHTML = '<p class="mb-0 small">Invalid email or password.</p>';
				msg.style.display = 'block';
				btn.disabled = false;
				btn.innerHTML = 'Sign In';
			}
		})
		.catch(function() {
			msg.className = 'alert alert-danger border-0 rounded-3';
			msg.innerHTML = '<p class="mb-0 small">Network error. Please try again.</p>';
			msg.style.display = 'block';
			btn.disabled = false;
			btn.innerHTML = 'Sign In';
		});
	});
});
</script>
{% endblock %}
