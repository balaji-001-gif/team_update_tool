{% extends "templates/web.html" %}

{% block title %}Signed Out - Team Update Tool{% endblock %}

{% block style %}
<link rel="stylesheet" href="/assets/team_update_tool/css/team_update_tool.css">
{% endblock %}

{% block page_content %}
<div class="tut-auth-page">
	<div class="tut-auth-card text-center">
		<div class="mb-3">
			<div class="tut-stat-icon tut-stat-icon-green mx-auto mb-2" style="width:56px;height:56px;">
				<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
			</div>
			<h2>Signed Out</h2>
			<p class="text-muted">You have been successfully signed out.</p>
		</div>

		<div class="d-flex flex-column gap-2">
			<a href="/team_update_tool/login" class="btn btn-success rounded-pill fw-semibold py-2">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="me-1"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
				Sign In Again
			</a>
			<a href="/team_update_tool" class="btn btn-outline-secondary rounded-pill py-2">
				<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="me-1"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
				Go to Home
			</a>
		</div>
	</div>
</div>
{% endblock %}
