{% extends "templates/web.html" %}

{% block title %}Contact - Team Update Tool{% endblock %}

{% block page_content %}
<div class="tut-page-header">
	<div class="container">
		<div class="tut-page-header-content">
			<h1 class="tut-page-title">Contact Us</h1>
			<p class="tut-page-desc">Get in touch with the team</p>
		</div>
	</div>
</div>

<div class="container tut-page-body">
	<div class="tut-contact-grid">
		<div class="tut-contact-info">
			<div class="tut-contact-card">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
					<polyline points="22,6 12,13 2,6"/>
				</svg>
				<h3>Email</h3>
				<p>admin@example.com</p>
			</div>
			<div class="tut-contact-card">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--blue-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
					<circle cx="12" cy="10" r="3"/>
				</svg>
				<h3>Location</h3>
				<p>Your Company Headquarters</p>
			</div>
			<div class="tut-contact-card">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--purple-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
				</svg>
				<h3>GitHub</h3>
				<a href="https://github.com/Sudhakar1110/team_update_tool" target="_blank">github.com/Sudhakar1110/team_update_tool</a>
			</div>
		</div>
	</div>
</div>
{% endblock %}
